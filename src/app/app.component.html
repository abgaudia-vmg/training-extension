<div
    class="flex flex-col items-center justify-center border rounded-md p-4 border-gray-300 dark:border-gray-600 bg-[var(--color-bg)] text-[var(--color-text)]"
>
    <h1>Extension Training</h1>
    <p>ACTO: {{ acto }}</p>
    <p>RETO: {{ reto }}</p>
    <button (click)="openTodoApplication()">Open Todo Application</button>
    <button (click)="toggleTheme()">
        TOGGLE
        {{ this.ThemeService.isDarkMode() ? "Light 🌞" : "Dark 🌙" }} MODE
    </button>
</div>
