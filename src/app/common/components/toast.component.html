@if (visible()) {
    <div [class]="containerClass()">
        <span class="shrink-0 font-bold">{{ iconForVariant() }}</span>
        <span>{{ message() }}</span>
        <button
            (click)="dismiss()"
            class="ml-auto shrink-0 opacity-60 hover:opacity-100 transition-opacity"
            aria-label="Dismiss"
        >
            ✕
        </button>
    </div>
}
